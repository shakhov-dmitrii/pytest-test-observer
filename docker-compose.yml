services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: pytest-test-observer-clickhouse
    ports:
      - "8123:8123"   # HTTP interface (used by clickhouse-connect)
      - "9000:9000"   # native protocol (used by clickhouse-client)
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - clickhouse-logs:/var/log/clickhouse-server
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.3.0
    container_name: pytest-test-observer-grafana
    ports:
      - "3000:3000"
    environment:
      # Auto-install the official ClickHouse datasource on first boot.
      GF_INSTALL_PLUGINS: "grafana-clickhouse-datasource"
      # Default admin/admin; OK for local dev only.
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      # Skip the "change password" nag and the analytics ping.
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_DISABLE_LOGIN_FORM: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      clickhouse:
        condition: service_healthy
    restart: unless-stopped

volumes:
  clickhouse-data:
  clickhouse-logs:
  grafana-data:
