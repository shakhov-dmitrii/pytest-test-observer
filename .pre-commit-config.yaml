repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: local
    hooks:
      - id: make-format
        name: Format code (make format)
        entry: make format
        language: system
        pass_filenames: false
        types: [python]

      - id: make-lint
        name: Lint code (make lint)
        entry: make lint
        language: system
        pass_filenames: false
        types: [python]

      - id: make-test
        name: Unit tests
        entry: make test
        language: system
        pass_filenames: false
        types: [python]
