name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          
      - name: Install dependencies
        run: make install
        
      - name: Check code formatting
        run: uv run ruff format --check .
          
      - name: Run linter
        run: make lint

  test:
    name: Tests & Coverage (Python ${{ matrix.python }})
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv and Python ${{ matrix.python }}
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: ${{ matrix.python }}
          
      - name: Install dependencies
        run: make install
        
      - name: Run tests with coverage
        run: make coverage

  smoke:
    name: Smoke Tests (ClickHouse)
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          
      - name: Start ClickHouse Container
        run: |
          docker run -d \
            --name pytest-test-observer-clickhouse \
            -p 8123:8123 \
            -p 9000:9000 \
            clickhouse/clickhouse-server:latest
            
          timeout 30 bash -c 'until curl -s http://localhost:8123; do sleep 1; done'
          
      - name: Install dependencies
        run: make install
        
      - name: Run smoke tests
        run: make smoke