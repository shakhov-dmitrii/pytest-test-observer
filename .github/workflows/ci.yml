name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: make install

      - name: Check code formatting
        run: uv run ruff format --check .

      - name: Run linter
        run: make lint

  test:
    name: Tests & Coverage (Python ${{ matrix.python }})
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv and Python ${{ matrix.python }}
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: ${{ matrix.python }}

      - name: Install dependencies
        run: make install

      - name: Run tests with coverage
        run: make coverage

  smoke:
    name: Smoke Tests (ClickHouse)
    needs: test
    runs-on: ubuntu-latest
    env:
      CH_PASSWORD: clickhouse
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Start ClickHouse Container
        run: |
          docker run -d \
            --name pytest-test-observer-clickhouse \
            -p 8123:8123 \
            -p 9000:9000 \
            -e CLICKHOUSE_PASSWORD=$CH_PASSWORD \
            clickhouse/clickhouse-server:latest

          timeout 30 bash -c 'until curl -s http://localhost:8123; do sleep 1; done'

      - name: Install dependencies
        run: make install

      - name: Run smoke tests
        run: make smoke CH_PASSWORD=$CH_PASSWORD

  smoke-replay:
    name: Smoke Replay Tests (ClickHouse)
    needs: test
    runs-on: ubuntu-latest
    env:
      CH_PASSWORD: clickhouse
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: make install

      - name: Run smoke tests
        run: uv run pytest tests/ --ch-url=localhost:8123 --ch-table=smoke --ch-password=$CH_PASSWORD -v

      - name: Start ClickHouse Container
        run: |
          docker run -d \
            --name pytest-test-observer-clickhouse \
            -p 8123:8123 \
            -p 9000:9000 \
            -e CLICKHOUSE_PASSWORD=$CH_PASSWORD \
            clickhouse/clickhouse-server:latest

          timeout 30 bash -c 'until curl -s http://localhost:8123; do sleep 1; done'

      - name: Replaying
        run: |
          uv run python -m pytest_test_observer.replay --ch-url=localhost:8123 --ch-table=smoke --ch-password=$CH_PASSWORD

          docker exec pytest-test-observer-clickhouse clickhouse-client \
            --password "$CH_PASSWORD" \
            -q "SELECT nodeid, status, ci_provider, ci_run_id, git_branch FROM default.smoke ORDER BY started_at LIMIT 10 FORMAT PrettyCompact"
