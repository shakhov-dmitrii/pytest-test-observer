apiVersion: 1

datasources:
  - name: ClickHouse
    type: grafana-clickhouse-datasource
    uid: clickhouse-pytest-observer
    isDefault: true
    editable: true
    jsonData:
      host: clickhouse        # docker-compose service name
      port: 8123
      protocol: http
      username: default
      defaultDatabase: default
      tlsSkipVerify: true
    secureJsonData:
      password: ""
